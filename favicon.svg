<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background: theme teal rounded square -->
  <rect width="64" height="64" rx="14" fill="#2C7A8C"/>

  <!-- Rocket icon scaled from 24x24 to fit in 64x64 with padding -->
  <!-- Scale factor ~2.2x, centered: translate(8, 8) scale(2.2) -->
  <g transform="translate(8,7) scale(2.2)" stroke="#F2F7F8" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- tail flame -->
    <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z" fill="#BFE6DC" stroke="#BFE6DC"/>
    <!-- rocket body -->
    <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
    <!-- left wing -->
    <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>
    <!-- right wing -->
    <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
  </g>
</svg>
